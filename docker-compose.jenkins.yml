services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: genai-jenkins-server
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      # Persist configuration and pipeline data
      - jenkins_home:/var/jenkins_home
      # Bind to host Docker daemon (allows Docker-in-Docker natively)
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
